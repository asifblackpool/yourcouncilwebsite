name: Docker - Build and push latest

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-latest:
    name: Build Block
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # DEBUG: Verify the secret exists and has a value
      - name: Debug - Check GH_PAT secret
        run: |
          echo "Checking if GH_PAT secret is available..."
          if [ -n "$GH_PAT" ]; then
            echo "? GH_PAT is set!"
            echo "Token length: ${#GH_PAT}"
            echo "Token first 4 chars: ${GH_PAT:0:4}"
          else
            echo "? GH_PAT is NOT set or is empty!"
            exit 1
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Stamp project version with build number
        run: |
          CSPROJ_FILE=$(find . -name "*.csproj" -not -path "./*Tests*" -not -path "./*test*" | head -1)
          echo "Found project file: $CSPROJ_FILE"
          sed -i 's|<Version>.*</Version>|<Version>1.0.${{ github.run_number }}</Version>|g' $CSPROJ_FILE
          echo "Updated version to:"
          grep -A 1 -B 1 '<Version>' $CSPROJ_FILE

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          echo "Building with GH_PAT (first 4 chars): ${GH_PAT:0:4}"
          docker build \
            --build-arg GH_PAT=${{ secrets.GH_PAT }} \
            --build-arg TARGETARCH=amd64 \
            -t ${{ env.IMAGE_NAME }}:build-${{ github.run_number }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:build-${{ github.run_number }}
          docker push ${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Push block to Contensis
    runs-on: ubuntu-latest
    needs: build-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Update Docker client
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          docker version --format '{{.Client.Version}}'
          
      - name: Push block to Contensis
        uses: contensis/block-push@v1
        env:
          DOCKER_API_VERSION: 1.44
        with:
          block-id: business-website
          alias: blackpool
          project-id: lgWebsite
          client-id: ${{ secrets.CONTENSIS_CLIENT_ID }}
          shared-secret: ${{ secrets.CONTENSIS_SHARED_SECRET }}
          image-uri: ${{ env.IMAGE_NAME }}:build-${{ github.run_number }}